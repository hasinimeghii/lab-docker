version: '3'

services:
  back:
    image: hasinimeghii/back-image
    ports:
      - "8080:5000"
    environment:
      - CURRENT_ENVIRONMENT=production
    # volumes:
    #   - ./back/logs:/app/logs

  front:
    image: hasinimeghii/front-image
    ports:
      - "8081:80"
    environment:
      - WS_BACK_URL=http://localhost:8080
    depends_on:
      - back
